name: guru gof autotests
# Когда запускаем
on: 
  push:
    branches: 
      - main
# ручной запуск
  workflow_dispatch:

jobs:
  gurutests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: action/checkout@v6?0.2
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.4.0
      - name: Устанавливаем пакеты из package.json
        run: npm ci
      - name: Устанавливаем браузер
        run: npx playwright install --with-deps
      - name: Запускаем тест
        run: npm -t
        
